<!DOCTYPE html>
<html lang="en">
    <head>
        <title>POPCAT CLASSIC</title>
        <style>
            /* Reset body spacing and set global font */
            body {
                margin: 0;
                padding: 0;
                font-family: sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .box {
                height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                background: #bdaa90;
                padding-top: 2rem;
                box-sizing: border-box;
                gap: 1rem;
            }

            /* Title box (if present) */
            #title-box {
                width: 80%;
                max-width: 60px;
            }

            /* New text container that fills remaining space */
            #op {
                width: 100%;
                max-width: 1600px;
                box-sizing: border-box;
                flex: 1; /* fill remaining space */
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 1rem;
                background-image: url('imgs/p.png');
                background-position: bottom center;
                background-size: contain;
                background-repeat: no-repeat;
            }

            .box p {
                width: 100%;
                box-sizing: border-box;
                text-align: center;
                margin: 0;
            }

            .box img {
                max-width: 90%;
                height: auto;
            }

            #counter {
                font-size: 6rem;
                font-weight: bold;
                width: 100%;
                text-align: center;
            }

            /* Prevent text selection inside the box */
            .box, .box * {
                user-select: none;
                -webkit-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
            }
        </style>
    </head>
    <body>
        <div class="box" style="position: relative;">

            <div id="op">
                <p>Click the cat to pop!</p>
            </div>
            <div id="counter" style="position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 3;">0</div>
        </div>
        <script>
// 計數器初始化
let counter = 0;

// 抓取計數器顯示元素
const counterElement = document.getElementById('counter');

// 計數器累加 function
function incrementCounter() {
    counter++;
}

// 更新計數器顯示
function updateCounterDisplay() {
    counterElement.textContent = counter;
}

// 註冊滑鼠按下事件到整個 box
const box = document.querySelector('.box');
const boxDiv = document.querySelector('.box');
// p.png/op.png 作為 box 背景
boxDiv.style.backgroundImage = "url('imgs/p.png')";

box.addEventListener('mousedown', function() {
    incrementCounter();
    updateCounterDisplay();
    console.log(counter);
    boxDiv.style.backgroundImage = "url('imgs/op.png')";
    setTimeout(() => {
        boxDiv.style.backgroundImage = "url('imgs/p.png')";
    }, 100);
});
// 初始化顯示
updateCounterDisplay();
        </script>
    </body>    
</html>
